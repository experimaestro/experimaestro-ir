id: t5_generative_small
title: "T5 generative trained on MS-Marco (debug)"
description: |
    This model has been trained on MsMarco v1 but only a few iterations (debug)

gpu: true
base: "t5-small"
dev_test_size: 50

validation:
    size: 10

indexation:
    requirements: duration=2 days & cpu(mem=4G)

retrieval:
    requirements: duration=2 days & cuda(mem=8G)
    k: 20

monobert:
    optimization:
        scheduler: false
        steps_per_epoch: 32
        max_epochs: 4
        batch_size: 8
        num_warmup_steps: 30
        warmup_min_factor: 0.1
        eps: 1.0e-6
        re_no_l2_regularization:
          - "\\.layer_norm\\."
          - "\\.final_layer_norm\\."


    # Only use 1% of the 100_000 triplets
    sample_rate: .01
    sample_max: 100_000

    validation_interval: 1
    validation_top_k: 20
    requirements: duration=2 days & cuda(mem=12G)
